<!DOCTYPE html>
<html lang="ja">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', -apple-system, sans-serif;
            line-height: 1.8;
            color: #3A2A26;
            background: #FDFAF8;
            padding: 20px;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .back {
            display: inline-block;
            font-size: 13px;
            color: #A87872;
            text-decoration: none;
            margin-bottom: 24px;
        }
        .back:hover { text-decoration: underline; }
        h1 {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 1.5em;
            margin-bottom: 4px;
            color: #3A2A26;
        }
        .app-name {
            font-size: 0.9em;
            color: #9A8480;
            margin-bottom: 32px;
        }
        p {
            font-size: 0.93em;
            margin-bottom: 16px;
            color: #6A5450;
        }
        .contact-box {
            background: #F0E8E4;
            padding: 28px 32px;
            border-radius: 12px;
            margin: 24px 0;
            text-align: center;
        }
        .contact-box .label {
            font-size: 13px;
            font-weight: 500;
            color: #9A8480;
            margin-bottom: 8px;
        }
        .contact-box .email {
            font-size: 18px;
            font-weight: 700;
            color: #A87872;
            text-decoration: none;
        }
        .contact-box .email:hover {
            text-decoration: underline;
        }
        .note {
            font-size: 0.85em;
            color: #9A8480;
            margin-top: 24px;
            line-height: 1.8;
        }
        .links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #E4CDCA;
            display: flex;
            gap: 24px;
            font-size: 0.9em;
        }
        .links a {
            color: #A87872;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">&larr; トップに戻る</a>
        <h1>お問い合わせ</h1>
        <p class="app-name">バロミル（Baromil）</p>

        <p>バロミルに関するご質問、不具合の報告、ご要望などがございましたら、以下のメールアドレスまでお気軽にご連絡ください。</p>

        <div class="contact-box">
            <div class="label">メールアドレス</div>
            <a href="mailto:baromil.app@gmail.com" class="email">baromil.app@gmail.com</a>
        </div>

        <p class="note">
            ※ お問い合わせの際は、お使いのiPhoneの機種名・iOSバージョン・アプリのバージョンを添えていただけると、より早く対応できます。<br>
            ※ 返信には数日いただく場合がございます。あらかじめご了承ください。
        </p>

        <div class="links">
            <a href="terms.html">利用規約</a>
            <a href="privacy-policy.html">プライバシーポリシー</a>
            <a href="https://apps.apple.com/app/id6761166495" target="_blank">App Store</a>
        </div>
    </div>

</html>
